<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Suite</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        height: 100%;
        min-height: 100vh;
      }
      body {
        font-family: "Roboto", sans-serif;
        background: #f0f2f5;
      }
      .sb-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .sb-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.18);
        border-radius: 4px;
      }
      .ct-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .ct-scroll::-webkit-scrollbar-thumb {
        background: #bdbdbd;
        border-radius: 4px;
      }
      .avatar-wrap .cam-btn {
        opacity: 0;
        transition: opacity 0.2s;
      }
      .avatar-wrap:hover .cam-btn {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      src="https://unpkg.com/react@17/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/@material-ui/core@4.12.4/umd/material-ui.production.min.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Scripts externos deshabilitados - React se carga desde src/index.js -->
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
  </body>
</html>
       
  </body>
</html>
